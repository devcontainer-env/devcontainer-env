name: test
permissions:
  contents: read
  id-token: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Run Tests
        run: nix develop --command cargo test
